apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert --chart -o ./helm/s7-ap-api
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: template-api
  name: template-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: template-api
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --chart -o ./helm/s7-ap-api
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: template-api
    spec:
      containers:
        - env:
            - name: ADM_NAME
              valueFrom:
                secretKeyRef:
                  key: ADM_NAME
                  name: s7-ap-api-secret
            - name: ADM_PWD
              valueFrom:
                secretKeyRef:
                  key: ADM_PWD
                  name: s7-ap-api-secret
            - name: APP_MODE
              value: template
            - name: AP_TEMPLATE_PAGE
              valueFrom:
                secretKeyRef:
                  key: AP_TEMPLATE_PAGE
                  name: s7-ap-api-secret
            - name: DEVICES_PAGE
              valueFrom:
                secretKeyRef:
                  key: DEVICES_PAGE
                  name: s7-ap-api-secret
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TABLE_SELECTOR
              valueFrom:
                secretKeyRef:
                  key: TABLE_SELECTOR
                  name: s7-ap-api-secret
            - name: WIDE_MANAGEMENT_PAGE
              valueFrom:
                secretKeyRef:
                  key: WIDE_MANAGEMENT_PAGE
                  name: s7-ap-api-secret
            - name: WIFI_CONTROLLER
              valueFrom:
                secretKeyRef:
                  key: WIFI_CONTROLLER
                  name: s7-ap-api-secret
          image: kwakminjung/template_api:v3.2
          name: template-api
          volumeMounts:
            - mountPath: /workspace/app/data
              name: template-data
      restartPolicy: Always
      volumes:
        - name: template-data
          hostPath:
            path: /data/template-api
            type: DirectoryOrCreate
