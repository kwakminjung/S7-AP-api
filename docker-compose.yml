services:
  aplist-api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - APP_MODE=aplist
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app/data:/workspace/app/data

  template-api:
    build: .
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - APP_MODE=template
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app/data:/workspace/app/data