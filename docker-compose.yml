version: '3.8'

services:
  aplist-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_MODE=aplist
      - PYTHONUNBUFFERED=1
    networks:
      - ap-net

  template-api:
    build: .
    environment:
      - APP_MODE=template
      - PYTHONUNBUFFERED=1
    networks:
      - ap-net

networks:
  ap-net:
    driver: bridge